<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinner App</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Main Spinner View -->
    <div id="view-main" class="view" style="display: none;">
        <div id="spin-view" class="spin-view">
            <!-- Headers will be injected here if enabled -->
            <div id="headers-container" class="headers-container" style="display: none;"></div>

            <!-- Spinners will be injected here -->
            <div id="spinners-container" class="spinners-container"></div>
        </div>
    </div>

    <!-- Data View -->
    <div id="view-data" class="view" style="display: none;">
        <div class="content-container">
            <h1>Data Management</h1>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="csv-has-headers"> First row contains list titles
                </label>
            </div>
            <div class="form-group">
                <label for="csv-upload">Load CSV Data:</label>
                <input type="file" id="csv-upload" accept=".csv">
            </div>
            <div class="actions">
                <button id="btn-delete-data">Delete Currently Loaded Data</button>
            </div>

            <div class="quick-load-section" id="quick-load-section">
                <h3>Quick Load Datasets</h3>
                <div id="quick-load-links" class="quick-load-links">
                    <!-- Links will be injected here -->
                </div>
            </div>

            <div class="data-preview" id="data-preview">
                <!-- Table will be injected here -->
            </div>
        </div>
    </div>

    <!-- Options View -->
    <div id="view-options" class="view" style="display: none;">
        <div class="content-container">
            <h1>Options</h1>
            <form id="options-form">
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="opt-display-title"> Display titles above lists (if available)
                    </label>
                </div>



                <div class="form-group">
                    <label for="opt-sampling-mode">Sampling Mode:</label>
                    <select id="opt-sampling-mode">
                        <option value="with">With Replacement</option>
                        <option value="without">Without Replacement</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="opt-first-draw-longer" checked> First draw is longer
                    </label>
                </div>

                <div class="form-group">
                    <label for="opt-first-delay">First Draw Delay (seconds):</label>
                    <input type="number" id="opt-first-delay" min="1" max="30" value="5">
                </div>

                <div class="form-group">
                    <label for="opt-subsequent-delay">Subsequent Draw Delays (seconds):</label>
                    <input type="number" id="opt-subsequent-delay" min="1" max="30" value="2">
                </div>
            </form>
        </div>
    </div>

    <!-- Footer Navigation Overlay -->
    <footer class="footer-nav">
        <a href="#data" id="link-data">Data</a>
        <a href="#options" id="link-options">Options</a>
        <a href="#main" id="link-main" style="display: none;">Back to Spinner</a>
    </footer>

    <!-- JS Application Entry -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
